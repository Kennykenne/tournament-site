<!DOCTYPE html>
<html>
<head>
  <title>Админка</title>
  <style>
    body {
      background: #0b001a;
      color: white;
      font-family: sans-serif;
      text-align: center;
    }

    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
    }

    .card {
      border: 1px solid #c77dff;
      margin: 10px;
      padding: 10px;
    }
  </style>
</head>
<body>

<h1>🔐 Админка</h1>

<div id="login">
  <input type="password" id="pass" placeholder="Пароль">
  <button onclick="login()">Войти</button>
</div>

<div id="panel" style="display:none;">
  <h2>📋 Команды</h2>
  <div id="list"></div>
</div>

<script>
async function login() {
  const password = document.getElementById("pass").value;

  const res = await fetch("https://tournament-site-ih81.onrender.com/admin-login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
    loadTeams();
  } else {
    alert("❌ Неверный пароль");
  }
}

async function loadTeams() {
  const res = await fetch("https://tournament-site-ih81.onrender.com/teams");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((t, i) => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <b>${t.team}</b> (#${t.slot})<br>
      ${t.players}<br>
      ${t.contact}<br>
      <button onclick="deleteTeam(${i})">❌ Удалить</button>
    `;
    list.appendChild(div);
  });
}

async function deleteTeam(i) {
  await fetch("/delete/" + i);
  loadTeams();
}
</script>

</body>
</html>
