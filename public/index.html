<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<style>
body {
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #14002a, #000);
  color:white;
  text-align:center;
}

/* баннер */
.banner {
  padding:80px 20px;
}

.banner h1 {
  font-size:40px;
  color:#c77dff;
  text-shadow:0 0 20px #a855f7;
}

.banner p {
  color:#aaa;
}

/* кнопка */
.btn {
  background:linear-gradient(45deg,#7b2cbf,#c77dff);
  border:none;
  padding:12px 20px;
  color:white;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
  box-shadow:0 0 15px #c77dff;
}

.btn:hover {
  transform:scale(1.05);
}

/* вкладки */
.tabs {
  margin-top:20px;
}

/* карточка */
.card {
  max-width:600px;
  margin:20px auto;
  padding:20px;
  background:rgba(30,0,60,0.8);
  border-radius:15px;
  box-shadow:0 0 20px #7b2cbf;
}

/* админ кнопки */
.topBtns {
  position:fixed;
  right:20px;
  top:20px;
}

</style>
</head>

<body>

<div class="topBtns">
  <button onclick="toggleAdmin()">⚙️</button>
</div>

<div class="banner">
  <h1>ORGANISATION EMOTIONS</h1>
  <p>Киберспортивные турниры по PUBG</p>

  <button class="btn" onclick="scrollToTournaments()">🎮 Турниры</button>
</div>

<div class="tabs">
  <button onclick="showTab('home')">🏠 Главная</button>
  <button onclick="showTab('tournaments')">🎮 Турниры</button>
</div>

<!-- О НАС -->
<div id="homeTab">
  <div class="card">
    <h2>О нас</h2>
    <p>Мы проводим турниры по PUBG с призами</p>
  </div>
</div>

<!-- ТУРНИРЫ -->
<div id="tournamentsTab" style="display:none;">
  <div id="tournaments"></div>
</div>

<script>

/* вкладки */
function showTab(tab){
  homeTab.style.display="none";
  tournamentsTab.style.display="none";

  if(tab==="home") homeTab.style.display="block";
  if(tab==="tournaments") tournamentsTab.style.display="block";
}

/* скролл */
function scrollToTournaments(){
  showTab("tournaments");
  window.scrollTo({top:400,behavior:"smooth"});
}

/* админка F9 */
document.addEventListener("keydown", e=>{
  if(e.key==="F9"){
    alert("Админка открыта 😎");
  }
});

/* турниры */
async function load(){
  const res = await fetch("/tournaments");
  const data = await res.json();

  tournaments.innerHTML="";

  data.forEach(t=>{
    tournaments.innerHTML+=`
      <div class="card">
        <img src="${t.image}" style="width:100%; border-radius:10px;">
        <h3>${t.name}</h3>
        <button class="btn" onclick="location.href='tournament.html?id=${t._id}'">
          Играть
        </button>
      </div>
    `;
  });
}

load();

</script>

</body>
</html>
