<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #14002a, #000);
  color:white;
  text-align:center;
}

.banner {
  padding:80px 20px;
}

.banner h1 {
  font-size:40px;
  color:#c77dff;
  text-shadow:0 0 20px #a855f7;
}

.btn {
  background:linear-gradient(45deg,#7b2cbf,#c77dff);
  border:none;
  padding:12px;
  color:white;
  border-radius:10px;
  margin:5px;
}

.card {
  max-width:600px;
  margin:20px auto;
  padding:20px;
  background:rgba(30,0,60,0.8);
  border-radius:15px;
  box-shadow:0 0 20px #7b2cbf;
}

#adminPanel {
  position:fixed;
  right:-320px;
  top:0;
  width:300px;
  height:100%;
  background:#0b001a;
  padding:15px;
  transition:0.3s;
  overflow:auto;
}
</style>
</head>

<body>

<div class="banner">
  <h1>ORGANISATION EMOTIONS</h1>
</div>

<h2>🎮 Турниры</h2>
<div id="tournaments"></div>

<div id="adminPanel">

<h3>⚙️ Админка</h3>

<input id="t_name" placeholder="Название"><br>

<textarea id="t_desc" placeholder="Описание"></textarea>

<select id="t_mode">
<option value="TDM">TDM</option>
<option value="DUO">DUO</option>
<option value="SQUAD">SQUAD</option>
</select>

<input id="t_image" placeholder="Картинка"><br>

<button onclick="save()">💾 Сохранить</button>

<hr>

<div id="adminList"></div>
<div id="adminTeams"></div>

</div>

<script>

let editId=null;

document.addEventListener("keydown", e=>{
  if(e.key==="F9"){
    adminPanel.style.right =
      adminPanel.style.right==="0px" ? "-320px":"0px";
    loadAdmin();
  }
});

async function load(){
  const res = await fetch("/tournaments");
  const data = await res.json();

  tournaments.innerHTML="";

  data.forEach(t=>{
    tournaments.innerHTML+=`
      <div class="card">
        <img src="${t.image}" width="200">
        <h3>${t.name}</h3>
        <p>${t.description || ""}</p>
        <button onclick="location.href='tournament.html?id=${t._id}'">
        Играть
        </button>
      </div>
    `;
  });
}

async function loadAdmin(){
  const res = await fetch("/tournaments");
  const data = await res.json();

  adminList.innerHTML="";

  data.forEach(t=>{
    adminList.innerHTML+=`
      <div class="card">
        ${t.name}<br>
        <small>${t.mode}</small>

        <button onclick="edit('${t._id}','${t.name}','${t.mode}','${t.image}','${t.description}')">✏️</button>
        <button onclick="del('${t._id}')">❌</button>
        <button onclick="teams('${t._id}')">👥</button>
      </div>
    `;
  });
}

function edit(id,name,mode,image,desc){
  editId=id;
  t_name.value=name;
  t_mode.value=mode;
  t_image.value=image;
  t_desc.value=desc || "";
}

async function save(){
  await fetch("/create-tournament",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      id:editId,
      name:t_name.value,
      mode:t_mode.value,
      image:t_image.value,
      description:t_desc.value
    })
  });

  editId=null;
  load();
  loadAdmin();
}

async function del(id){
  await fetch("/delete-tournament/"+id,{method:"DELETE"});
  load();
  loadAdmin();
}

async function teams(id){
  const res = await fetch("/teams/"+id);
  const data = await res.json();

  adminTeams.innerHTML="";

  data.forEach(t=>{
    adminTeams.innerHTML+=`
      <div class="card">
        ${t.team}
        <button onclick="delTeam('${t._id}','${id}')">❌</button>
      </div>
    `;
  });
}

async function delTeam(id,tid){
  await fetch("/delete-team/"+id,{method:"DELETE"});
  teams(tid);
}

load();

</script>
</body>
</html>
