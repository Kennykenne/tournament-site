<!DOCTYPE html>
<html>
<body style="background:black;color:white;font-family:sans-serif">

<div style="position:fixed; top:10px; right:10px;">
  <button onclick="openAuth()">👤</button>
</div>

<h1 style="text-align:center;">ORGANISATION EMOTIONS</h1>

<!-- AUTH -->
<div id="authModal" style="display:none; position:fixed; width:100%; height:100%; background:#000a;">
  <div style="background:#111; padding:20px; max-width:300px; margin:100px auto;">
    <input id="login" placeholder="Логин"><br>
    <input id="password" type="password" placeholder="Пароль"><br>

    <button onclick="login()">Войти</button>
    <button onclick="registerUser()">Регистрация</button>
  </div>
</div>

<!-- USER -->
<div id="userInfo" style="text-align:center;margin-top:20px;"></div>

<!-- ADMIN -->
<div id="adminPanel" style="display:none;text-align:center;margin-top:20px;">
  <h2>⚙️ Админка</h2>
</div>

<script>

function openAuth(){
  authModal.style.display="block";
}

/* REGISTER */
async function registerUser(){
  const res = await fetch("/api/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      login:login.value,
      password:password.value
    })
  });

  const data = await res.json();

  if(data.error){
    alert(data.error);
  } else {
    alert("Аккаунт создан");
  }
}

/* LOGIN */
async function login(){
  const res = await fetch("/api/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    credentials:"include",
    body:JSON.stringify({
      login:login.value,
      password:password.value
    })
  });

  const data = await res.json();

  if(data.error){
    alert(data.error);
    return;
  }

  authModal.style.display="none";
  loadUser();
}

/* USER LOAD */
async function loadUser(){
  const res = await fetch("/api/me",{credentials:"include"});
  const data = await res.json();

  if(data.user){
    userInfo.innerHTML = `
      👤 ${data.user.login}
      <button onclick="logout()">🚪 Выйти</button>
    `;

    if(data.user.isAdmin){
      adminPanel.style.display="block";
    }
  } else {
    userInfo.innerHTML = "Гость";
  }
}

/* LOGOUT */
async function logout(){
  await fetch("/api/logout",{method:"POST"});
  location.reload();
}

loadUser();

</script>

</body>
</html>
