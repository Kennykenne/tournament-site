<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORGANISATION EMOTIONS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #12002b, #000);
  color: white;
}

.header {
  text-align: center;
  padding: 60px 20px;
}

.header h1 {
  font-size: 36px;
  color: #c77dff;
}

.header p {
  color: #aaa;
}

.card {
  background: rgba(20,0,40,0.8);
  border: 1px solid #7b2cbf;
  border-radius: 15px;
  padding: 20px;
  margin: 15px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
  box-shadow: 0 0 20px #c77dff;
}

.btn {
  background: linear-gradient(45deg, #7b2cbf, #c77dff);
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

.section {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* 🔐 кнопка входа */
.loginBtn {
  position: fixed;
  top: 20px;
  right: 20px;
}

/* 🔐 панель */
#adminPanel {
  position: fixed;
  right: 0;
  top: 0;
  width: 280px;
  height: 100%;
  background: #0b001a;
  padding: 15px;
  display: none;
}
</style>
</head>

<body>

<div class="loginBtn">
  <button class="btn" onclick="openLogin()">🔐 Войти</button>
</div>

<div class="header">
  <h1>𝑶𝑹𝑮𝑨𝑵𝑰𝑺𝑨𝑻𝑰𝑶𝑵 𝑬𝑴𝑶𝑻𝑰𝑶𝑵𝑺</h1>
  <p>Мы проводим киберспортивные турниры по PUBG</p>
</div>

<div class="section">
  <h2 style="text-align:center;">🎮 Доступные турниры</h2>
  <div id="tournaments"></div>
</div>

<!-- 🔐 LOGIN -->
<div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000a;">
  <div style="background:#111; padding:20px; max-width:300px; margin:100px auto;">
    <input id="adminPass" placeholder="Пароль">
    <button class="btn" onclick="login()">Войти</button>
  </div>
</div>

<!-- 🔐 АДМИНКА -->
<div id="adminPanel">
  <h3>⚙️ Админка</h3>

  <input id="t_name" placeholder="Название">
  <input id="t_desc" placeholder="Описание">
  <input id="t_mode" placeholder="Режим">
  <input id="t_slots" placeholder="Слоты">
  <input id="t_image" placeholder="Ссылка на картинку">

  <button class="btn" onclick="createTournament()">Создать</button>
</div>

<script>
function openLogin() {
  document.getElementById("loginModal").style.display = "block";
}

async function login() {
  const password = document.getElementById("adminPass").value;

  const res = await fetch("https://tournament-site-ih81.onrender.com/api/admin-login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ password })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("admin", "true");
    document.getElementById("loginModal").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  } else {
    alert("❌ Неверный пароль");
  }
}

async function loadTournaments() {
  const res = await fetch("https://tournament-site-ih81.onrender.com/tournaments");
  const data = await res.json();

  const container = document.getElementById("tournaments");
  container.innerHTML = "";

  data.forEach(t => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${t.image}" style="width:100%; border-radius:10px;">
      <h3>${t.name}</h3>
      <p>${t.description}</p>
      <p>🎮 ${t.mode}</p>
      <button class="btn" onclick="openTournament('${t._id}')">Открыть</button>
    `;

    container.appendChild(div);
  });
}

function openTournament(id) {
  window.location.href = "tournament.html?id=" + id;
}

async function createTournament() {
  const name = document.getElementById("t_name").value;
  const description = document.getElementById("t_desc").value;
  const mode = document.getElementById("t_mode").value;
  const maxSlots = document.getElementById("t_slots").value;
  const image = document.getElementById("t_image").value;

  if (!name || !description || !mode || !maxSlots || !image) {
    alert("❗ Заполни все поля");
    return;
  }

  await fetch("https://tournament-site-ih81.onrender.com/create-tournament", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name,
      description,
      mode,
      image,
      maxSlots: Number(maxSlots)
    })
  });

  alert("Турнир создан");
  loadTournaments();
}

/* показать админку */
if (localStorage.getItem("admin") === "true") {
  document.getElementById("adminPanel").style.display = "block";
}

loadTournaments();
</script>

</body>
</html>
