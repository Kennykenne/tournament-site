<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ORG</title>
</head>

<body>

<h1>ORGANISATION</h1>

<button onclick="openAuth()">👤</button>

<div id="auth" style="display:none;">
<input id="login">
<input id="password">
<button onclick="login()">Login</button>
<button onclick="registerUser()">Register</button>
</div>

<div id="tournaments"></div>

<script>

function openAuth(){
  auth.style.display="block";
}

async function registerUser(){
  await fetch("/api/register",{method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({login:login.value,password:password.value})});
}

async function login(){
  const res=await fetch("/api/login",{method:"POST",
  headers:{"Content-Type":"application/json"},
  credentials:"include",
  body:JSON.stringify({login:login.value,password:password.value})});

  const d=await res.json();
  if(d.success){
    alert("ok");
  }
}

async function load(){
  const res=await fetch("/tournaments");
  const data=await res.json();

  tournaments.innerHTML="";
  data.forEach(t=>{
    tournaments.innerHTML+=`
    <div>
    <h3>${t.name}</h3>
    <button onclick="location.href='tournament.html?id=${t._id}'">
    open
    </button>
    </div>`;
  });
}

load();

</script>

</body>
</html>
