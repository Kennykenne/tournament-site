<!DOCTYPE html>
<html>
<head>
<style>
body {
  background:#0b001a;
  color:white;
  font-family:sans-serif;
}

.card {
  background:#1a0033;
  padding:15px;
  margin:10px;
  border-radius:15px;
  box-shadow:0 0 10px #7b2cbf;
}

.card:hover {
  box-shadow:0 0 20px #c77dff;
}

#adminPanel {
  position:fixed;
  right:-320px;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  padding:10px;
  transition:0.3s;
}
</style>
</head>

<body>

<h1 style="text-align:center">ORGANISATION EMOTIONS</h1>

<div style="text-align:center">
<button onclick="window.open('https://t.me/YOUR_CHANNEL')">📩 Telegram</button>
</div>

<hr>

<h2>🎮 Турниры</h2>
<div id="tournaments"></div>

<h2>🏆 История</h2>
<div id="history"></div>

<!-- админ -->
<div id="adminPanel">

<h3>Админка</h3>

<input id="t_name" placeholder="Название">
<input id="t_mode" placeholder="TDM / DUO / SQUAD">
<input id="t_image" placeholder="Картинка">

<button onclick="create()">Создать</button>

</div>

<script>

/* скрытая админка */
document.addEventListener("keydown", e=>{
  if(e.key==="F9"){
    adminPanel.style.right = adminPanel.style.right==="0px" ? "-320px":"0px";
  }
});

/* турниры */
async function load(){
  const res = await fetch("/tournaments");
  const data = await res.json();

  tournaments.innerHTML="";

  data.forEach(t=>{
    tournaments.innerHTML+=`
      <div class="card">
        <img src="${t.image}" width="200">
        <h3>${t.name}</h3>
        <button onclick="location.href='tournament.html?id=${t._id}'">
        Играть
        </button>
      </div>
    `;
  });
}

/* история */
function loadHistory(){
  history.innerHTML=`
    <div class="card">🏆 DUO CUP - Team Alpha</div>
    <div class="card">🏆 SQUAD CUP - Team Beta</div>
  `;
}

/* создать турнир */
async function create(){
  await fetch("/create-tournament",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:t_name.value,
      mode:t_mode.value,
      image:t_image.value
    })
  });

  load();
}

load();
loadHistory();

</script>

</body>
</html>
