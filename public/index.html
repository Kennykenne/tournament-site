<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORGANISATION EMOTIONS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #12002b, #000);
  color: white;
}

/* ХЕДЕР */
.header {
  text-align: center;
  padding: 60px 20px;
}

.header h1 {
  font-size: 36px;
  color: #c77dff;
}

.header p {
  color: #aaa;
}

/* КАРТОЧКИ */
.card {
  background: rgba(20,0,40,0.8);
  border: 1px solid #7b2cbf;
  border-radius: 15px;
  padding: 20px;
  margin: 15px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
  box-shadow: 0 0 20px #c77dff;
}

/* КНОПКА */
.btn {
  background: linear-gradient(45deg, #7b2cbf, #c77dff);
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

/* СЕКЦИЯ */
.section {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

 </style>
</head>

<body>

<div class="header">
  <h1>𝑶𝑹𝑮𝑨𝑵𝑰𝑺𝑨𝑻𝑰𝑶𝑵 𝑬𝑴𝑶𝑻𝑰𝑶𝑵𝑺</h1>
  <p>Мы проводим киберспортивные турниры по PUBG</p>
</div>

<div class="section">
  <h2 style="text-align:center;">🎮 Доступные турниры</h2>

  <div id="tournaments"></div>
</div>

<script>
async function loadTournaments() {
  const res = await fetch("https://tournament-site-ih81.onrender.com/tournaments");
  const data = await res.json();

  const container = document.getElementById("tournaments");
  container.innerHTML = "";

  data.forEach(t => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${t.name}</h3>
      <p>${t.description}</p>
      <p>🎮 ${t.mode}</p>
      <button class="btn" onclick="openTournament('${t._id}')">Открыть</button>
    `;

    container.appendChild(div);
  });
}

function openTournament(id) {
  window.location.href = "tournament.html?id=" + id;
}

loadTournaments();
</script>

</body>
</html>
