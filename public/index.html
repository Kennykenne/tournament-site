<!DOCTYPE html>
<html>
<body style="background:#0b001a;color:white">

<h1>ORGANISATION EMOTIONS</h1>

<div id="tournaments"></div>

<script>

async function load(){
  const res = await fetch("/tournaments");
  const data = await res.json();

  tournaments.innerHTML="";

  data.forEach(t=>{
    tournaments.innerHTML+=`
      <div style="margin:20px;padding:10px;background:#1a0033">
        <img src="${t.image}" style="width:200px">
        <h3>${t.name}</h3>
        <button onclick="location.href='tournament.html?id=${t._id}'">
        Играть
        </button>
      </div>
    `;
  });
}

load();

</script>

</body>
</html>
