<!DOCTYPE html>
<html>
<head>
<style>
body {
  background:#0b001a;
  color:white;
  font-family:sans-serif;
  margin:0;
}

h1 {
  text-align:center;
  margin-top:20px;
}

.card {
  background:#1a0033;
  padding:15px;
  margin:10px;
  border-radius:15px;
  box-shadow:0 0 10px #7b2cbf;
}

.card:hover {
  box-shadow:0 0 20px #c77dff;
}

/* 🔥 админка теперь не ломает сайт */
#adminPanel {
  position:fixed;
  right:-320px;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  padding:10px;
  transition:0.3s;
  overflow:auto;
  z-index:1000;
  box-shadow:-5px 0 15px #7b2cbf;
}

/* контент отдельно */
#content {
  padding:20px;
}
</style>
</head>

<body>

<h1>ORGANISATION EMOTIONS</h1>

<div style="text-align:center">
<button onclick="window.open('https://t.me/YOUR_CHANNEL')">📩 Telegram</button>
</div>

<hr>

<div id="content">
<h2>🎮 Турниры</h2>
<div id="tournaments"></div>
</div>

<!-- ADMIN -->
<div id="adminPanel">

<h3>⚙️ Админка</h3>

<input id="t_name" placeholder="Название"><br>
<input id="t_mode" placeholder="TDM / DUO / SQUAD"><br>
<input id="t_image" placeholder="Картинка"><br>

<button onclick="save()">💾 Сохранить</button>

<hr>

<div id="adminList"></div>
<div id="adminTeams"></div>

</div>

<script>

let editId=null;

/* 🔥 F9 открывает */
document.addEventListener("keydown", e=>{
  if(e.key==="F9"){
    const panel = document.getElementById("adminPanel");

    panel.style.right = panel.style.right==="0px"
      ? "-320px"
      : "0px";

    loadAdmin();
  }
});

/* турниры */
async function load(){
  const res = await fetch("/tournaments");
  const data = await res.json();

  tournaments.innerHTML="";

  data.forEach(t=>{
    tournaments.innerHTML+=`
      <div class="card">
        <img src="${t.image}" width="200">
        <h3>${t.name}</h3>
        <button onclick="location.href='tournament.html?id=${t._id}'">
        Играть
        </button>
      </div>
    `;
  });
}

/* админ */
async function loadAdmin(){
  const res = await fetch("/tournaments");
  const data = await res.json();

  adminList.innerHTML="";

  data.forEach(t=>{
    adminList.innerHTML+=`
      <div class="card">
        ${t.name}<br>

        <button onclick="edit('${t._id}','${t.name}','${t.mode}','${t.image}')">✏️</button>
        <button onclick="del('${t._id}')">❌</button>
        <button onclick="teams('${t._id}')">👥</button>
      </div>
    `;
  });
}

/* редактировать */
function edit(id,name,mode,image){
  editId=id;
  t_name.value=name;
  t_mode.value=mode;
  t_image.value=image;
}

/* сохранить */
async function save(){
  await fetch("/create-tournament",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      id:editId,
      name:t_name.value,
      mode:t_mode.value,
      image:t_image.value
    })
  });

  editId=null;
  load();
  loadAdmin();
}

/* удалить турнир */
async function del(id){
  await fetch("/delete-tournament/"+id,{method:"DELETE"});
  load();
  loadAdmin();
}

/* команды */
async function teams(id){
  const res = await fetch("/teams/"+id);
  const data = await res.json();

  adminTeams.innerHTML="";

  data.forEach(t=>{
    adminTeams.innerHTML+=`
      <div class="card">
        ${t.team}
        <button onclick="delTeam('${t._id}','${id}')">❌</button>
      </div>
    `;
  });
}

/* удалить команду */
async function delTeam(id,tid){
  await fetch("/delete-team/"+id,{method:"DELETE"});
  teams(tid);
}

load();

</script>

</body>
</html>
