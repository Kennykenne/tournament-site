<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #12002b, #000);
  color: white;
}

.banner {
  text-align: center;
  padding: 80px 20px;
}

.banner h1 {
  font-size: 40px;
  color: #c77dff;
}

.btn {
  background: linear-gradient(45deg, #7b2cbf, #c77dff);
  padding: 10px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  border: none;
  margin: 5px;
}

.card {
  background: rgba(20,0,40,0.8);
  border-radius: 15px;
  padding: 20px;
  margin: 15px;
}

.section {
  max-width: 900px;
  margin: auto;
}

/* 🔐 админка скрыта */
#adminPanel {
  position: fixed;
  right: -320px;
  top: 0;
  width: 300px;
  height: 100%;
  background: #0b001a;
  padding: 15px;
  transition: 0.3s;
  overflow:auto;
  z-index:1000;
}
</style>
</head>

<body>

<!-- кнопка входа -->
<div style="position:fixed; top:10px; right:10px;">
  <button class="btn" onclick="openLogin()">🔐</button>
</div>

<div class="banner">
  <h1>ORGANISATION EMOTIONS</h1>
  <p>Киберспортивные турниры по PUBG</p>
</div>

<h2>🎮 Турниры</h2>
<div id="tournaments"></div>

<!-- LOGIN -->
<div id="loginModal" style="display:none; position:fixed; width:100%; height:100%; background:#000a;">
  <div style="background:#111; padding:20px; max-width:300px; margin:100px auto;">
    <input id="adminPass" placeholder="Пароль">
    <button onclick="login()">Войти</button>
  </div>
</div>

<!-- АДМИНКА -->
<div id="adminPanel">

<h3>⚙️ Админка</h3>

<input id="t_name" placeholder="Название"><br>
<input id="t_desc" placeholder="Описание"><br>
<input id="t_mode" placeholder="Режим"><br>
<input id="t_image" placeholder="Картинка"><br>

<button onclick="createTournament()">Создать</button>

<hr>

<div id="adminList"></div>
<div id="adminTeams"></div>

</div>

<script>

/* открыть логин */
function openLogin(){
  loginModal.style.display="block";
}

/* 🔐 ЛОГИН ЧЕРЕЗ ПАРОЛЬ */
function login(){
  const pass = adminPass.value;

  if(pass !== "1234"){
    alert("Неверный пароль");
    return;
  }

  loginModal.style.display="none";

  // открываем админку
  adminPanel.style.right="0px";

  loadAdmin();
}

/* турниры */
async function loadTournaments(){
  const res = await fetch("/tournaments");
  const data = await res.json();

  tournaments.innerHTML="";

  data.forEach(t=>{
    tournaments.innerHTML+=`
      <div class="card">
        <img src="${t.image}" style="width:100%">
        <h3>${t.name}</h3>
        <button onclick="location.href='tournament.html?id=${t._id}'">
        Играть
        </button>
      </div>
    `;
  });
}

/* админ список */
async function loadAdmin(){
  const res = await fetch("/tournaments");
  const data = await res.json();

  adminList.innerHTML="";

  data.forEach(t=>{
    adminList.innerHTML+=`
      <div class="card">
        ${t.name}<br>
        <button onclick="loadTeams('${t._id}')">👥</button>
        <button onclick="deleteTournament('${t._id}')">❌</button>
      </div>
    `;
  });
}

/* создать */
async function createTournament(){
  await fetch("/create-tournament",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:t_name.value,
      description:t_desc.value,
      mode:t_mode.value,
      image:t_image.value
    })
  });

  loadTournaments();
  loadAdmin();
}

/* удалить турнир */
async function deleteTournament(id){
  await fetch("/delete-tournament/"+id,{method:"DELETE"});
  loadTournaments();
  loadAdmin();
}

/* команды */
async function loadTeams(id){
  const res = await fetch("/teams/"+id);
  const data = await res.json();

  adminTeams.innerHTML="";

  data.forEach(t=>{
    adminTeams.innerHTML+=`
      <div class="card">
        ${t.team}
        <button onclick="deleteTeam('${t._id}','${id}')">❌</button>
      </div>
    `;
  });
}

/* удалить команду */
async function deleteTeam(id,tid){
  await fetch("/delete-team/"+id,{method:"DELETE"});
  loadTeams(tid);
}

loadTournaments();

</script>

</body>
</html>
