<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #14002a, #000);
  color:white;
  text-align:center;
}

/* баннер */
.banner {
  padding:80px 20px;
}

.banner h1 {
  font-size:40px;
  color:#c77dff;
  text-shadow:0 0 20px #a855f7;
}

.banner p {
  color:#aaa;
}

/* кнопка */
.btn {
  background:linear-gradient(45deg,#7b2cbf,#c77dff);
  border:none;
  padding:12px 20px;
  color:white;
  border-radius:10px;
  cursor:pointer;
  margin:5px;
  box-shadow:0 0 15px #c77dff;
}

.btn:hover {
  transform:scale(1.05);
}

/* карточки */
.card {
  max-width:600px;
  margin:20px auto;
  padding:20px;
  background:rgba(30,0,60,0.8);
  border-radius:15px;
  box-shadow:0 0 20px #7b2cbf;
}

/* админка */
#adminPanel {
  position:fixed;
  right:-320px;
  top:0;
  width:300px;
  height:100%;
  background:#0b001a;
  padding:15px;
  transition:0.3s;
  overflow:auto;
  z-index:1000;
  box-shadow:-5px 0 20px #7b2cbf;
}
</style>
</head>

<body>

<!-- баннер -->
<div class="banner">
  <h1>ORGANISATION EMOTIONS</h1>
  <p>Киберспортивные турниры по PUBG</p>

  <button class="btn" onclick="window.open('https://t.me/YOUR_CHANNEL')">
    📩 Telegram
  </button>
</div>

<hr>

<h2>🎮 Турниры</h2>
<div id="tournaments"></div>

<!-- админка -->
<div id="adminPanel">

<h3>⚙️ Админка</h3>

<input id="t_name" placeholder="Название"><br>
<input id="t_mode" placeholder="TDM / DUO / SQUAD"><br>
<input id="t_image" placeholder="Картинка"><br>

<button class="btn" onclick="save()">💾 Сохранить</button>

<hr>

<div id="adminList"></div>
<div id="adminTeams"></div>

</div>

<script>

let editId=null;

/* 🔥 F9 */
document.addEventListener("keydown", e=>{
  if(e.key==="F9"){
    const panel = document.getElementById("adminPanel");

    panel.style.right = panel.style.right==="0px"
      ? "-320px"
      : "0px";

    loadAdmin();
  }
});

/* турниры */
async function load(){
  const res = await fetch("/tournaments");
  const data = await res.json();

  tournaments.innerHTML="";

  data.forEach(t=>{
    tournaments.innerHTML+=`
      <div class="card">
        <img src="${t.image}" style="width:100%; border-radius:10px;">
        <h3>${t.name}</h3>
        <button class="btn" onclick="location.href='tournament.html?id=${t._id}'">
          Играть
        </button>
      </div>
    `;
  });
}

/* админ список */
async function loadAdmin(){
  const res = await fetch("/tournaments");
  const data = await res.json();

  adminList.innerHTML="";

  data.forEach(t=>{
    adminList.innerHTML+=`
      <div class="card">
        ${t.name}<br>

        <button onclick="edit('${t._id}','${t.name}','${t.mode}','${t.image}')">✏️</button>
        <button onclick="del('${t._id}')">❌</button>
        <button onclick="teams('${t._id}')">👥</button>
      </div>
    `;
  });
}

/* редактировать */
function edit(id,name,mode,image){
  editId=id;
  t_name.value=name;
  t_mode.value=mode;
  t_image.value=image;
}

/* сохранить */
async function save(){
  await fetch("/create-tournament",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      id:editId,
      name:t_name.value,
      mode:t_mode.value,
      image:t_image.value
    })
  });

  editId=null;
  load();
  loadAdmin();
}

/* удалить турнир */
async function del(id){
  await fetch("/delete-tournament/"+id,{method:"DELETE"});
  load();
  loadAdmin();
}

/* команды */
async function teams(id){
  const res = await fetch("/teams/"+id);
  const data = await res.json();

  adminTeams.innerHTML="";

  data.forEach(t=>{
    adminTeams.innerHTML+=`
      <div class="card">
        ${t.team}
        <button onclick="delTeam('${t._id}','${id}')">❌</button>
      </div>
    `;
  });
}

/* удалить команду */
async function delTeam(id,tid){
  await fetch("/delete-team/"+id,{method:"DELETE"});
  teams(tid);
}

load();

</script>

</body>
</html>
