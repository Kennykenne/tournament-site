<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORGANISATION EMOTIONS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #12002b, #000);
  color: white;
}

/* 🔥 БАННЕР */
.banner {
  text-align: center;
  padding: 80px 20px;
}

.banner h1 {
  font-size: 40px;
  color: #c77dff;
  text-shadow: 0 0 20px #a855f7;
}

.banner p {
  color: #aaa;
  margin-top: 10px;
}

/* 🔥 КНОПКИ */
.btn {
  background: linear-gradient(45deg, #7b2cbf, #c77dff);
  padding: 12px 20px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  margin: 10px;
  border: none;
}

/* 🔥 СЕКЦИЯ */
.section {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* 🔥 КАРТОЧКИ */
.card {
  background: rgba(20,0,40,0.8);
  border: 1px solid #7b2cbf;
  border-radius: 15px;
  padding: 20px;
  margin: 15px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
  box-shadow: 0 0 20px #c77dff;
}

/* 🔥 ВКЛАДКИ */
.tabs {
  text-align: center;
  margin-bottom: 20px;
}

/* 🔥 АДМИНКА */
#adminPanel {
  position: fixed;
  right: -320px;
  top: 0;
  width: 300px;
  height: 100%;
  background: #0b001a;
  padding: 15px;
  transition: 0.3s;
  overflow:auto;
}
</style>
</head>

<body>

<!-- 🔐 кнопки -->
<div style="position:fixed; top:10px; right:10px;">
  <button class="btn" onclick="openLogin()">🔐</button>
  <button class="btn" onclick="toggleAdmin()">⚙️</button>
</div>

<!-- 🔥 БАННЕР -->
<div class="banner">
  <h1>ORGANISATION EMOTIONS</h1>
  <p>Киберспортивные турниры по PUBG</p>

  <button class="btn" onclick="showTab('tournaments')">
    🎮 Смотреть турниры
  </button>

  <button class="btn" onclick="window.open('https://t.me/YOUR_CHANNEL')">
    📩 Наш Telegram
  </button>
</div>

<!-- 🔥 ВКЛАДКИ -->
<div class="tabs">
  <button onclick="showTab('home')">🏠 Главная</button>
  <button onclick="showTab('tournaments')">🎮 Турниры</button>
</div>

<!-- 🏠 ГЛАВНАЯ -->
<div id="homeTab" class="section">
  <div class="card">
    <h2>О нас</h2>
    <p>
      Мы проводим турниры по PUBG с призами и рейтингом.
      Участвуй и стань лучшим!
    </p>
  </div>
</div>

<!-- 🎮 ТУРНИРЫ -->
<div id="tournamentsTab" class="section" style="display:none;">
  <div id="tournaments"></div>
</div>

<!-- 🔐 LOGIN -->
<div id="loginModal" style="display:none; position:fixed; width:100%; height:100%; background:#000a;">
  <div style="background:#111; padding:20px; max-width:300px; margin:100px auto;">
    <input id="adminPass">
    <button onclick="login()">Войти</button>
  </div>
</div>

<!-- ⚙️ АДМИНКА -->
<div id="adminPanel">
  <h3>⚙️ Админка</h3>

  <input id="t_name" placeholder="Название">
  <input id="t_desc" placeholder="Описание">
  <input id="t_mode" placeholder="Режим">
  <input id="t_slots" placeholder="Слоты">

  <input type="file" id="imageFile">

  <button onclick="createTournament()">Создать</button>

  <hr>

  <div id="adminList"></div>
  <div id="adminTeams"></div>
</div>

<script>
function showTab(tab){
  document.getElementById("homeTab").style.display="none";
  document.getElementById("tournamentsTab").style.display="none";

  if(tab==="home"){
    document.getElementById("homeTab").style.display="block";
  } else {
    document.getElementById("tournamentsTab").style.display="block";
  }
}

function toggleAdmin(){
  const panel=document.getElementById("adminPanel");
  panel.style.right = panel.style.right==="0px" ? "-320px":"0px";
}

function openLogin(){
  document.getElementById("loginModal").style.display="block";
}

async function login(){
  const password=document.getElementById("adminPass").value;

  const res=await fetch("/api/admin-login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    credentials:"include",
    body:JSON.stringify({password})
  });

  const data=await res.json();

  if(data.success){
    toggleAdmin();
    loadAdmin();
  }
}

async function loadTournaments(){
  const res=await fetch("/tournaments");
  const data=await res.json();

  const container=document.getElementById("tournaments");
  container.innerHTML="";

  data.forEach(t=>{
    container.innerHTML+=`
      <div class="card">
        <img src="${t.image}" style="width:100%">
        <h3>${t.name}</h3>
        <button onclick="openTournament('${t._id}')">Открыть</button>
      </div>
    `;
  });
}

function openTournament(id){
  window.location.href="tournament.html?id="+id;
}

loadTournaments();
</script>

</body>
</html>
