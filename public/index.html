<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORGANISATION EMOTIONS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #12002b, #000);
  color: white;
}

.header {
  text-align: center;
  padding: 60px 20px;
}

.header h1 {
  font-size: 36px;
  color: #c77dff;
}

.header p {
  color: #aaa;
}

.card {
  background: rgba(20,0,40,0.8);
  border: 1px solid #7b2cbf;
  border-radius: 15px;
  padding: 20px;
  margin: 15px;
  text-align: center;
}

.btn {
  background: linear-gradient(45deg, #7b2cbf, #c77dff);
  padding: 10px;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  margin-top: 5px;
}

.section {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.loginBtn {
  position: fixed;
  top: 20px;
  right: 20px;
}

#adminPanel {
  position: fixed;
  right: 0;
  top: 0;
  width: 280px;
  height: 100%;
  background: #0b001a;
  padding: 15px;
  display: none;
  overflow: auto;
}
</style>
</head>

<body>

<div class="loginBtn">
  <button class="btn" onclick="openLogin()">🔐 Войти</button>
</div>

<div class="header">
  <h1>𝑶𝑹𝑮𝑨𝑵𝑰𝑺𝑨𝑻𝑰𝑶𝑵 𝑬𝑴𝑶𝑻𝑰𝑶𝑵𝑺</h1>
  <p>Мы проводим киберспортивные турниры по PUBG</p>
</div>

<div class="section">
  <h2 style="text-align:center;">🎮 Доступные турниры</h2>
  <div id="tournaments"></div>
</div>

<!-- LOGIN -->
<div id="loginModal" style="display:none; position:fixed; width:100%; height:100%; background:#000a;">
  <div style="background:#111; padding:20px; max-width:300px; margin:100px auto;">
    <input id="adminPass" placeholder="Пароль">
    <button class="btn" onclick="login()">Войти</button>
  </div>
</div>

<!-- АДМИНКА -->
<div id="adminPanel">
  <h3>⚙️ Админка</h3>

  <h4>Создать турнир</h4>
  <input id="t_name" placeholder="Название">
  <input id="t_desc" placeholder="Описание">
  <input id="t_mode" placeholder="Режим">
  <input id="t_slots" placeholder="Слоты">
  <input id="t_image" placeholder="Картинка URL">

  <button class="btn" onclick="createTournament()">Создать</button>

  <hr>

  <h4>Управление турнирами</h4>
  <div id="adminList"></div>
</div>

<script>
function openLogin() {
  document.getElementById("loginModal").style.display = "block";
}

async function login() {
  const password = document.getElementById("adminPass").value;

  const res = await fetch("/api/admin-login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ password })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("admin", "true");
    document.getElementById("loginModal").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadAdmin();
  } else {
    alert("❌ Неверный пароль");
  }
}

async function loadTournaments() {
  const res = await fetch("/tournaments");
  const data = await res.json();

  const container = document.getElementById("tournaments");
  container.innerHTML = "";

  data.forEach(t => {
    container.innerHTML += `
      <div class="card">
        <img src="${t.image}" style="width:100%; border-radius:10px;">
        <h3>${t.name}</h3>
        <p>${t.description}</p>
        <p>${t.mode}</p>
        <button class="btn" onclick="openTournament('${t._id}')">Открыть</button>
      </div>
    `;
  });
}

async function loadAdmin() {
  const res = await fetch("/tournaments");
  const data = await res.json();

  const container = document.getElementById("adminList");
  container.innerHTML = "";

  data.forEach(t => {
    container.innerHTML += `
      <div style="border:1px solid #555; padding:10px; margin:10px;">
        <b>${t.name}</b><br>
        <button onclick="openTournament('${t._id}')">Открыть</button>
        <button onclick="deleteTournament('${t._id}')">❌</button>
      </div>
    `;
  });
}

function openTournament(id) {
  window.location.href = "tournament.html?id=" + id;
}

async function createTournament() {
  const name = document.getElementById("t_name").value;
  const description = document.getElementById("t_desc").value;
  const mode = document.getElementById("t_mode").value;
  const maxSlots = document.getElementById("t_slots").value;
  const image = document.getElementById("t_image").value;

  if (!name || !description || !mode || !maxSlots || !image) {
    alert("Заполни всё");
    return;
  }

  await fetch("/create-tournament", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ name, description, mode, image, maxSlots })
  });

  loadTournaments();
  loadAdmin();
}

async function deleteTournament(id) {
  if (!confirm("Удалить турнир?")) return;

  await fetch("/delete-tournament/" + id, { method: "DELETE" });

  loadTournaments();
  loadAdmin();
}

/* авто вход */
if (localStorage.getItem("admin") === "true") {
  document.getElementById("adminPanel").style.display = "block";
  loadAdmin();
}

loadTournaments();
</script>

</body>
</html>
