<!DOCTYPE html>
<html>
<body style="background:#12002b;color:white">

<button onclick="location.href='/'">🏠</button>
<button onclick="history.back()">⬅</button>

<h2 id="name"></h2>

<div id="form"></div>
<button onclick="reg()">Регистрация</button>

<div id="teams"></div>

<script>
const id=new URLSearchParams(location.search).get("id");
let mode="";

async function load(){
  const t=await fetch("/tournament/"+id).then(r=>r.json());
  name.innerText=t.name;
  mode=t.mode;

  render();

  const list=await fetch("/teams/"+id).then(r=>r.json());
  teams.innerHTML="";

  list.forEach((x,i)=>{
    let medal=i==0?"🥇":i==1?"🥈":i==2?"🥉":"";
    teams.innerHTML+=`<div>${medal} ${x.team}</div>`;
  });
}

function render(){
  if(mode==="TDM"){
    form.innerHTML=`<input id="nick1"><input id="id1"><input id="contact">`;
  }

  if(mode==="DUO"){
    form.innerHTML=`<input id="nick1"><input id="id1">
    <input id="nick2"><input id="id2">
    <input id="contact">`;
  }

  if(mode==="SQUAD"){
    form.innerHTML=`<input id="nick1"><input id="id1">
    <input id="nick2"><input id="id2">
    <input id="nick3"><input id="id3">
    <input id="nick4"><input id="id4">
    <input id="contact">`;
  }
}

async function reg(){
  let players="";

  if(mode==="TDM"){
    players=`${nick1.value} (${id1.value})`;
  }

  if(mode==="DUO"){
    players=`${nick1.value}\n${nick2.value}`;
  }

  if(mode==="SQUAD"){
    players=`${nick1.value}\n${nick2.value}\n${nick3.value}\n${nick4.value}`;
  }

  await fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      team:"TEAM",
      players,
      contact:contact.value,
      tournamentId:id
    })
  });

  load();
}

load();
</script>
</body>
</html>
