<!DOCTYPE html>
<html>
<body>

<button onclick="location.href='/'">🏠</button>

<h2 id="name"></h2>

<input id="team">
<input id="nick1">
<input id="id1">
<input id="nick2">
<input id="id2">
<input id="contact">

<button onclick="reg()">REGISTER</button>

<div id="teams"></div>

<script>
const id=new URLSearchParams(location.search).get("id");

async function load(){
  const t=await fetch("/tournament/"+id).then(r=>r.json());
  name.innerText=t.name;

  const list=await fetch("/teams/"+id).then(r=>r.json());
  teams.innerHTML="";

  list.forEach(x=>{
    teams.innerHTML+=`<div>${x.team}</div>`;
  });
}

async function reg(){
  const players=`${nick1.value} (${id1.value})`;

  await fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      team:team.value,
      players,
      contact:contact.value,
      tournamentId:id
    })
  });

  load();
}

load();
</script>

</body>
</html>
